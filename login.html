<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <div>
        <h3>User Login</h3>
        <input id="login-name" placeholder="Name">
        <input id="login-password" type="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>

    
    <div id="payment-section" style="display:none;">
        <h3>Payment</h3>

        <img id="gcash-img" width="200"/>

        <input type="file" id="receipt-input">
        <button onclick="submitReceipt()">Submit Receipt</button>
    </div>
    
        <select id="order-filter" onchange="apply_UserFilter()">
            <option value="">All</option>
            <option value="Pending">Pending</option>
            <option value="Accepted">Accepted</option>
            <option value="Paid">Paid</option>
            <option value="Claimed">Claimed</option>
            <option value="Completed">Completed</option>
            <option value="Rejected">Rejected</option>
        </select>
 
    <div id="usr_orders-container"> </div>
    
    <a href="/order"> make order </a>

    <button type="button" onclick="logout()"> Logout </button>

    <script src="client.js"> </script>

</body>
</html>
