<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
    <h3>Vendor Login</h3>

    <input id="username" placeholder="Email or Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="vendorLogin()">Login</button>
</div>
<div id="vendor-home"></div>

<button onclick="toggleOrders()"> Orders </button>

<div id="orders-container" style="display:none;"></div>

<button onclick="toggleHandlingOrders()"> Handling Orders</button>

<div id="handling-container" style="display:none;">
    
    <select id="order-filter" onchange="applyFilter()">
        <option value="Accepted">Accepted</option>
        <option value="Paid">Paid</option>
        <option value="Claimed">Claimed</option>
        <option value="Completed">Completed</option>
        <option value="Rejected">Rejected</option>
    </select>

    <div id="orders-list"></div>

</div>

<div id="availability-section">
    <h3>Availability</h3>

    <label>
        <input type="radio" name="availability" value="Available"> Available
    </label>

    <label>
        <input type="radio" name="availability" value="Busy"> Busy 
    </label>

    <label>
        <input type="radio" name="availability" value="SBusy"> Slightly Busy 
    </label>

    <label>
        <input type="radio" name="availability" value="Closed"> Closed
    </label>


    <br><br>

    <button onclick="updateAvailability()">Confirm</button>

    <div>
        <h3>Upload GCash QR</h3>
        <input type="file" id="gcash-file">
        <button onclick="uploadGcash()">Upload</button>
    </div>


</div>



    

<script src="login_vendor.js"> </script>
<script src="app.js?v=2"> </script>
</body>
</html>
